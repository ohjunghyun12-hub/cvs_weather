<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS25 지역별 주간 날씨 및 발주 가이드</title>
    <!-- Tailwind CSS 및 FontAwesome 아이콘 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-12">

    <!-- 상단 헤더 -->
    <header class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cloud-sun-rain text-2xl text-cyan-200"></i>
                <h1 class="text-xl font-bold tracking-tight">GS25 지역별 주간 날씨 및 발주 가이드</h1>
            </div>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
        
        <!-- 상단 영역: 조건 선택 및 주간 기상 정보 -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 환경 설정 카드 -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 space-y-4 flex flex-col justify-between">
                <div>
                    <div class="border-b border-slate-100 pb-2 mb-3">
                        <h2 class="font-bold text-slate-900 flex items-center"><i class="fa-solid fa-map-location-dot text-blue-600 mr-2"></i>지역 및 시점 선택</h2>
                    </div>

                    <!-- 1. 지역 선택 -->
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">시/도</label>
                            <select id="sidoSelect" onchange="updateSigungu()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                <option value="daejeon">대전광역시</option>
                                <option value="sejong">세종특별자치시</option>
                                <option value="chungnam">충청남도</option>
                                <option value="gwangju">광주광역시</option>
                                <option value="jeonbuk">전북특별자치도</option>
                                <option value="jeonnam">전라남도</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">시/군/구</label>
                            <select id="sigunguSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                <!-- 자바스크립트에서 동적 생성 -->
                            </select>
                        </div>
                    </div>

                    <!-- 2. 주차 선택 -->
                    <div class="mb-3">
                        <label class="block text-xs font-bold text-slate-500 mb-1">코칭 대상 주차</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="btnThisWeek" onclick="setWeek('this')" class="py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600">금주 예보</button>
                            <button id="btnNextWeek" onclick="setWeek('next')" class="py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50">차주 예보</button>
                        </div>
                    </div>

                    <!-- 3. 상권 분류 -->
                    <div class="mb-3">
                        <label class="block text-xs font-bold text-slate-500 mb-1">점포 상권 유형</label>
                        <select id="sangkwonSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="apart">아파트주거</option>
                            <option value="villa">빌라주거</option>
                            <option value="single">소가구주거</option>
                            <option value="work">근무지(오피스/공단)</option>
                            <option value="hotplace">유동강세(역세권/번화가 번잡지역)</option>
                            <option value="travel">여행지 / 유원지</option>
                            <option value="special">특수 / 기타</option>
                        </select>
                    </div>
                </div>

                <!-- 4. 특수 이벤트 체크 -->
                <div class="flex items-center pt-2 border-t border-slate-100">
                    <input type="checkbox" id="worldcupCheck" checked onchange="calculateWeatherAndCoaching()" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500">
                    <label for="worldcupCheck" class="ml-2 text-xs font-bold text-slate-700 select-none flex items-center">
                        <span>6월 월드컵 경기 일정 포함</span>
                        <span class="ml-1.5 bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded-full">특수</span>
                    </label>
                </div>
            </div>

            <!-- 주간 날씨 모니터링 판넬 -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 lg:col-span-2">
                <div class="border-b border-slate-100 pb-2 mb-4 flex justify-between items-center">
                    <!-- [수정완료] 이미지(image_d81ede.png) 내 텍스트 영역을 요청하신 문구로 정확히 수정했습니다. -->
                    <h3 class="font-bold text-slate-900 text-sm flex items-center">
                        <i class="fa-solid fa-calendar-week text-cyan-600 mr-2"></i>
                        주간 기상 분석(실시간 날짜 연동)
                    </h3>
                    <span id="todayBadge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-md"></span>
                </div>
                <div id="weeklyWeatherContainer" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2.5">
                    <!-- 데이터 렌더링 -->
                </div>
            </div>
        </section>

        <!-- 하단 영역: 실시간 발주 코칭 솔루션 및 카테고리 가이드 -->
        <section class="space-y-6">
            
            <!-- 경영주 발주 코칭 스크립트 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center">
                        <i class="fa-solid fa-comment-sms text-cyan-500 mr-2"></i>
                        경영주 발주 코칭 가이드 스크립트
                    </h2>
                    <button onclick="copyScript()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1.5 rounded flex items-center transition">
                        <i class="fa-regular fa-copy mr-1"></i> 스크립트 복사
                    </button>
                </div>
                <blockquote id="coachingQuote" class="bg-slate-50 border-l-4 border-blue-600 p-4 rounded-r-lg text-slate-700 text-xs sm:text-sm leading-relaxed font-medium whitespace-pre-line">
                    기상 데이터를 분석하여 실시간 안내 문구를 생성하고 있습니다...
                </blockquote>
            </div>

            <!-- 카테고리별 상세 가이드라인 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200 space-y-5">
                <div class="border-b border-slate-100 pb-2">
                    <h3 class="font-bold text-slate-900 text-sm flex items-center"><i class="fa-solid fa-boxes-stacked text-indigo-600 mr-2"></i>카테고리별 종합 발주 가이드</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 1. FRESH FOOD -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-cyan-700 mb-2 flex items-center">
                            <i class="fa-solid fa-box-tissue mr-1.5"></i> FRESH FOOD (FF)
                        </h4>
                        <p id="ffContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 2. 카운터 FF -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-orange-700 mb-2 flex items-center">
                            <i class="fa-solid fa-drumstick-bite mr-1.5"></i> 카운터 FF (즉석조리)
                        </h4>
                        <p id="counterFfContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 3. 주류 / 음료 -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-blue-700 mb-2 flex items-center">
                            <i class="fa-solid fa-beer-mug-empty mr-1.5"></i> 주류 / 음료 카테고리
                        </h4>
                        <p id="drinkContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 4. 일반상품 / 아이스 / 비식품 -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-purple-700 mb-2 flex items-center">
                            <i class="fa-solid fa-snowflake mr-1.5"></i> 아이스 / 가공 / 비식품
                        </h4>
                        <p id="generalContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 스크립트 및 비즈니스 데이터 매핑 엔진 -->
    <script>
        const regionStructure = {
            daejeon: ["동구", "중구", "서구", "유성구", "대덕구"],
            sejong: ["세종특별자치시"],
            chungnam: ["천안시 동남구", "천안시 서북구", "공주시", "보령시", "아산시", "서산시", "논산시", "계룡시", "당진시", "금산군", "부여군", "서천군", "청양군", "홍성군", "예산군", "태안군"],
            gwangju: ["동구", "서구", "남구", "북구", "광산구"],
            jeonbuk: ["전주시 완산구", "전주시 덕진구", "군산시", "익산시", "정읍시", "남원시", "김제시", "완주군", "진안군", "무주군", "장수군", "임실군", "순창군", "고창군", "부안군"],
            jeonnam: ["목포시", "여수시", "순천시", "나주시", "광양시", "담양군", "곡성군", "구례군", "고흥군", "보성군", "화순군", "장흥군", "강진군", "해남군", "영암군", "무안군", "함평군", "영광군", "장성군", "완도군", "진도군", "신안군"]
        };

        const sidoLabels = {
            daejeon: "대전광역시", sejong: "세종특별자치시", chungnam: "충청남도",
            gwangju: "광주광역시", jeonbuk: "전북특별자치도", jeonnam: "전라남도"
        };

        const nationalHolidays = {
            "01-01": "신정", "03-01": "삼일절", "05-05": "어린이날", "06-06": "현충일", 
            "08-15": "광복절", "10-03": "개천절", "10-09": "한글날", "12-25": "크리스마스"
        };

        let currentWeek = 'this'; 

        function getDatesList(week) {
            const baseDate = new Date(); 
            if (week === 'next') {
                baseDate.setDate(baseDate.getDate() + 7); 
            }
            
            const daysShort = ["일", "월", "화", "수", "목", "금", "토"];
            let result = [];

            for(let i=0; i<7; i++) {
                let tempDate = new Date(baseDate);
                tempDate.setDate(baseDate.getDate() + i);

                let month = String(tempDate.getMonth() + 1).padStart(2, '0');
                let date = String(tempDate.getDate()).padStart(2, '0');
                let mdKey = `${month}-${date}`;
                
                let holidayName = nationalHolidays[mdKey] || null;
                let isRedDay = (tempDate.getDay() === 0 || holidayName !== null); 

                result.push({
                    dateString: `${tempDate.getMonth() + 1}/${tempDate.getDate()}`,
                    dayLabel: daysShort[tempDate.getDay()],
                    isRedDay: isRedDay,
                    holidayName: holidayName
                });
            }
            return result;
        }

        function updateSigungu() {
            const sido = document.getElementById("sidoSelect").value;
            const sigunguSelect = document.getElementById("sigunguSelect");
            sigunguSelect.innerHTML = "";

            const sigunguList = regionStructure[sido];
            sigunguList.forEach(name => {
                const opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                sigunguSelect.appendChild(opt);
            });

            calculateWeatherAndCoaching();
        }

        function setWeek(week) {
            currentWeek = week;
            const btnThis = document.getElementById("btnThisWeek");
            const btnNext = document.getElementById("btnNextWeek");

            if(week === 'this') {
                btnThis.className = "py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600";
                btnNext.className = "py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50";
            } else {
                btnNext.className = "py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600";
                btnThis.className = "py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50";
            }
            calculateWeatherAndCoaching();
        }

        function generateFakeForecast(seedName, week) {
            const datesInfo = getDatesList(week);
            const hash = seedName.charCodeAt(0) || 0;
            
            return datesInfo.map((d, i) => {
                let temp = 22;
                let status = "perfect";
                let icon = "fa-cloud-sun";

                if (hash % 3 === 0) {
                    temp = (week === 'this') ? 21 + (i % 3) : 23 + (i % 2);
                    status = (i === 3 || i === 4) ? "rain_heavy" : (i === 2 ? "shower" : "perfect");
                    icon = (i === 3 || i === 4) ? "fa-umbrella" : (i === 2 ? "fa-cloud-showers-heavy" : "fa-sun");
                } else if (hash % 3 === 1) {
                    temp = (week === 'this') ? 26 + (i % 4) : 30 + (i % 4);
                    status = (week === 'next' && i >= 2 && i <= 4) ? "hot_core" : "hot_early";
                    icon = (week === 'next' && i >= 2 && i <= 4) ? "fa-temperature-high" : "fa-sun";
                } else {
                    temp = 22 + (i % 3);
                    status = "perfect";
                    icon = "fa-sun";
                }

                return { ...d, temp: temp, status: status, icon: icon };
            });
        }

        function getCategoryGuidelines(weather, sangkwon) {
            let guide = { ff: "", counterFf: "", drink: "", general: "" };

            if (weather === "hot_core" || weather === "hot_early") {
                switch(sangkwon) {
                    case "apart":
                    case "villa":
                    case "single":
                        guide.ff = "• 야간 열대야 유입 고객 증가: 저녁 전후 안주용 도시락 및 조리면 등 FF 카테고리 발주를 20% 정도 여유 있게 상향해 주세요.\n• 주거지 특성에 맞춰 소가구 취식용 조리 샌드위치군 다단 진열을 다각화해 두시면 좋습니다.";
                        guide.counterFf = "• 치킨25 야간 홈술 안주 수요 집중: 저녁 18시 전후 치킨 조리 진열장 내 닭다리, 꼬치류를 부족하지 않게 준비해 주세요.\n• 카페25 야간 아이스 메뉴 수요를 고려하여 에스프레소 추출구 등 위생 관리를 미리 점검해 주시기 바랍니다.";
                        guide.drink = "• 주거밀착형 대용량 홈술 가이드: 국산/수입 맥주 번들(4캔/6캔) 및 대용량 페트 탄산음료 발주를 30% 정도 늘려주세요.\n• WIC 쇼케이스 최하단에 증량 적재해 두시는 것을 추천합니다.";
                        guide.general = "• 가족단위 야간 산책 고객 타겟: 일반/빅 컵얼음을 평소보다 1.5배 정도 넉넉하게 채워주세요.\n• 홈타입 통형 아이스크림 및 멀티바류 발주 보강이 효과적입니다.";
                        break;
                    case "work":
                        guide.ff = "• 주중 출근 및 점심 피크타임 단기 회전: 오전 테이크아웃용 삼각김밥, 샌드위치 등 FF 발주를 20% 정도 강화해 주세요.\n• 주말 공동화에 대비하여 금요일 저녁 FF 발주량은 알맞게 조절하시는 것이 좋습니다.";
                        guide.counterFf = "• 점심시간 직장인 테이크아웃 집중: 11시~13시 사이 카페25 아이스 아메리카노 원재료 및 부자재(컵, 빨대)를 가득 충진해 주세요.\n• 치킨25는 간식용 스낵 위주로 오전에 소량 조리 배치하는 것이 유리합니다.";
                        guide.drink = "• 출근 시간대 숙취해소음료, 기능성 에너지드링크, 소용량 제로 탄산 중심 냉장 매대 집중 전개.\n• 주중 야간 직장인 회식 대피용 숙취해소제 카운터 연관 진열.";
                        guide.general = "• 오피스 가판 중심: 직장인 매장 내 취식용 일반 컵얼음 다량 확보.\n• 사무실 비치용 소형 물티슈 및 구강청결제 카운터 옆 유치.";
                        break;
                    case "hotplace":
                        guide.ff = "• 바쁜 이동 인구의 빠른 취식 타겟: 이동 중 취식이 편한 줄김밥, 햄버거, 조리 빵류 중심의 FF 발주를 25% 정도 증량해 주세요.\n• 무거운 도시락보다는 회전율이 높은 소형 FF 제품 위주로 결품이 없도록 다단 진열을 유지해 주시기 바랍니다.";
                        guide.counterFf = "• 테이크아웃 폭발: 카페25 전 기기 가동률을 높이고, 아이스 원부재료를 매장 물류창고에 여유 있게 확보해 주세요.\n• 길 가던 고객의 눈길을 사로잡을 수 있도록 치킨 조리 진열장에 소형 조각치킨이나 꼬치류를 상시 노출해 구매를 유도해 주세요.";

        function calculateWeatherAndCoaching() {
            const now = new Date();
            const days = ["일", "월", "화", "수", "목", "금", "토"];
            document.getElementById("todayBadge").innerText = `기준일: ${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

            const sido = document.getElementById("sidoSelect").value;
            const sigungu = document.getElementById("sigunguSelect").value || "전체";
            const sangkwon = document.getElementById("sangkwonSelect").value;
            const isWorldcup = document.getElementById("worldcupCheck").checked;

            if(!sigungu) return;

            const forecast = generateFakeForecast(sigungu, currentWeek);

            const container = document.getElementById("weeklyWeatherContainer");
            container.innerHTML = "";
            
            forecast.forEach(item => {
                let statusBadge = "";
                if(item.status === "hot_core") statusBadge = "<span class='text-[10px] bg-red-100 text-red-600 px-1 py-0.5 rounded font-bold'>폭염</span>";
                else if(item.status === "hot_early") statusBadge = "<span class='text-[10px] bg-orange-100 text-orange-600 px-1 py-0.5 rounded font-bold'>초여름</span>";
                else if(item.status === "shower" || item.status === "rain_heavy") statusBadge = "<span class='text-[10px] bg-blue-100 text-blue-600 px-1 py-0.5 rounded font-bold'>비/소나기</span>";
                else statusBadge = "<span class='text-[10px] bg-emerald-100 text-emerald-600 px-1 py-0.5 rounded font-bold'>맑음</span>";

                let holidayTag = item.holidayName ? `<div class="absolute top-1 right-1 text-[9px] bg-red-600 text-white font-extrabold px-1 rounded shadow-2xs animate-pulse">${item.holidayName}</div>` : "";
                let dayColorClass = item.isRedDay ? "text-red-600 font-extrabold" : "text-slate-600 font-bold";

                container.innerHTML += `
                    <div class="relative flex flex-col items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-200 text-center space-y-1.5 shadow-2xs min-h-[110px]">
                        ${holidayTag}
                        <div class="text-[11px] text-slate-400 font-medium">${item.dateString}</div>
                        <div class="text-xs ${dayColorClass}">${item.dayLabel}요일</div>
                        <i class="fa-solid ${item.icon} text-slate-400 text-sm"></i>
                        <div class="font-bold text-xs text-slate-800">${item.temp}℃</div>
                        <div>${statusBadge}</div>
                    </div>
                `;
            });

            let countHotCore = 0, countHotEarly = 0, countRain = 0, countHoliday = 0;
            forecast.forEach(f => {
                if(f.status === "hot_core") countHotCore++;
                if(f.status === "hot_early") countHotEarly++;
                if(f.status === "shower" || f.status === "rain_heavy") countRain++;
                if(f.isRedDay) countHoliday++;
            });

            let primaryWeather = "perfect";
            if (countHotCore >= 2) primaryWeather = "hot_core";
            else if (countRain >= 2) primaryWeather = "rain_heavy";
            else if (countHotEarly >= 3) primaryWeather = "hot_early";

            const finalGuide = getCategoryGuidelines(primaryWeather, sangkwon);

            let scriptText = `안녕하세요 경영주님! 이번 주 [${sidoLabels[sido]} ${sigungu}] 지역의 주간 매장 기상 안내 정보입니다.\n`;
            if(primaryWeather === "hot_core") scriptText += "낮 최고 기온이 33도 이상 올라가는 한여름 폭염 날씨가 이어질 것으로 보여서, 야간 시간대에 시원한 맥주나 음료, 얼음컵을 찾는 발길이 크게 늘어날 것 같습니다. ";
            else if(primaryWeather === "rain_heavy") scriptText += "이번 주에는 집중호우나 소나기 소식이 자주 있어서 매장을 찾아오시는 고객님들의 동선과 가판대 우산 매대를 미리 부드럽게 점검해 두시는 것이 좋겠습니다. ";
            else if(primaryWeather === "hot_early") scriptText += "평균 기온이 부쩍 올라가는 초여름 날씨가 예상되어서, 본격적인 여름철 시즌 상품들의 매출이 기분 좋게 상승할 것으로 전망됩니다. ";
            else scriptText += "활동하기 아주 좋은 맑고 쾌적한 날씨가 이어질 것으로 보여서 전반적인 매장 상품들의 판매 활성화가 기대되는 한 주입니다. ";

            if (countHoliday > 1) {
                scriptText += " 특히 이번 주간은 달력에 빨간 날(공휴일 연휴)이 섞여 있어서, 현재 우리 매장 상권에 맞는 고객님들의 이동 동선을 미리 파악해 두시는 것이 매출을 올리는 중요한 열쇠가 될 것입니다.";
            }

            if(sangkwon === "apart" || sangkwon === "villa" || sangkwon === "single") {
                scriptText += "\n\n우리 매장은 주거밀착형 상권에 해당하므로 비가 오는 날 집에서 즐기시는 '홈술 막걸리 특수'나 더운 날 야간에 찾으시는 '집콕 안주' 카테고리를 중심으로 발주 가이드를 세팅해 드렸으니, 제품이 모자라지 않게 챙겨보시면 좋겠습니다.";
            } else if(sangkwon === "work") {
                scriptText += "\n\n우리 매장은 오피스/근무지 상권에 해당하므로 주말 공휴일의 공백을 채우기 위해, 평일 직장인분들의 출근 및 점심 피크타임에 맞춘 단기 집중 가이드와 우천 시 건물 내부 이동 고객을 잡는 안내를 준비했습니다.";
            } else if(sangkwon === "hotplace") {
                scriptText += "\n\n우리 매장은 번화가나 역세권 같은 유동강세 상권에 해당하므로, 길을 지나가며 가볍고 빠르게 사 갈 수 있는 1인용 FF 상품이나 소용량 음료, 우천 시 즉각적인 가판대 우산 배치 전략을 중심축으로 제안해 드립니다.";
            } else if(sangkwon === "travel") {
                scriptText += "\n\n우리 매장은 여행지나 유원지 상권에 해당하므로, 맑은 날 야외 활동을 즐기러 온 피크닉족을 위한 프리미엄 다인용 간편식, 와인/주류 번들, 그리고 나들이용 가판 편의용품 모음 진열 전략을 연동해 두었습니다.";
            } else {
                scriptText += "\n\n매장만의 특수한 유동 패턴에 맞추어 이동 중에 드시기 편한 완제품 위주의 가이드라인을 하단 카테고리에 알맞게 맞춤형으로 연동해 두었습니다.";
            }

            if (isWorldcup) {
                scriptText += "\n\n⚽ [월드컵 빅이벤트 안내] 야간에 축구 경기 일정이 예정되어 있습니다! 배달 대란으로 인해 가까운 편의점에서 즉석조리 식품이나 야식을 직접 구매하려는 수요가 최고조에 달할 수 있으니 아래 기회손실 방지 안내를 꼭 확인해 주세요.";
                finalGuide.ff += "\n⚽ [월드컵 가이드] 축구 경기를 보며 야간에 즐길 수 있는 냉장 족발, 편육, 불닭발, 밀키트 안주 종류 등 FF 발주를 평소보다 50% 정도 넉넉하게 채워주세요!";
                finalGuide.counterFf += "\n⚽ [월드컵 가이드] 치킨25 원부재료를 평소보다 2배 이상 미리 확보해 두시고, 경기 시작 2시간 전에는 치킨 조리 진열장에 대표 세트 상품들이 풍성하게 보이도록 미리 조리해 두시는 것을 추천합니다.";
                finalGuide.drink += "\n⚽ [월드컵 가이드] 경기 전날 WIC 쇼케이스 가장 깊숙한 안쪽 공간까지 맥주 번들 상품들을 미리 가득 채워 넣어주세요. (고객님들이 미지근한 맥주를 가져가시는 일을 줄일 수 있습니다).";
                finalGuide.general += "\n⚽ [월드컵 가이드] 안주와 함께 구매하기 좋은 마른안주(육포, 오징어) 및 대형 봉지 과자류를 카운터 앞 돌출 매대에 추가로 보기 좋게 모아 진열해 주세요.";
            }

            document.getElementById("coachingQuote").innerText = scriptText;
            document.getElementById("ffContent").innerText = finalGuide.ff;
            document.getElementById("counterFfContent").innerText = finalGuide.counterFf;
            document.getElementById("drinkContent").innerText = finalGuide.drink;
            document.getElementById("generalContent").innerText = finalGuide.general;
        }

        function copyScript() {
            const text = document.getElementById("coachingQuote").innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("발주 코칭 스크립트가 클립보드에 복사되었습니다.\n경영주님 소통 채널에 즉시 편하게 활용하세요!");
            });
        }

        window.onload = function() {
            updateSigungu();
        };
    </script>
</body>
</html>
