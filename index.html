        function setWeek(week) {
            currentWeek = week;
            const activeClass   = "py-2.5 text-sm font-bold rounded-lg border bg-blue-600 text-white border-blue-600 transition";
            const inactiveClass = "py-2.5 text-sm font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50 transition";
            document.getElementById("btnThisWeek").className = week === 'this' ? activeClass : inactiveClass;

            calculateWeatherAndCoaching();
        }

        function getDatesList(week) {
            const baseDate = new Date();
            if (week === 'next') baseDate.setDate(baseDate.getDate() + 7);
            const daysShort = ["일", "월", "화", "수", "목", "금", "토"];
            let result = [];
            for (let i = 0; i < 7; i++) {
                let d  = new Date(baseDate);
                d.setDate(baseDate.getDate() + i);
                let yyyy = d.getFullYear();
                let mm   = String(d.getMonth() + 1).padStart(2, '0');
                let dd   = String(d.getDate()).padStart(2, '0');
                let mdKey      = mm + "-" + dd;
                let apiDateKey = yyyy + "-" + mm + "-" + dd;
                result.push({
                    apiDateKey, mdKey,
                    dateString:  (d.getMonth() + 1) + "/" + d.getDate(),
                    dayLabel:    daysShort[d.getDay()],
                    isRedDay:    (d.getDay() === 0 || !!nationalHolidays[mdKey]),
                    holidayName: nationalHolidays[mdKey] || null,
                    matchInfo:   worldCupMatches[mdKey]  || null
                });
            }
            return result;
        }

        async function fetchRealWeather(coord, datesInfo) {
            const url = "https://api.open-meteo.com/v1/forecast"
                + "?latitude="  + coord.lat
                + "&longitude=" + coord.lon
                + "&daily=weather_code,temperature_2m_max,temperature_2m_min"
                + "&timezone=Asia%2FSeoul&forecast_days=14";
            try {
                const response = await fetch(url);
                const data     = await response.json();
                return datesInfo.map(d => {
                    const index = data.daily.time.indexOf(d.apiDateKey);
                    let minTemp = 18, maxTemp = 25, status = "perfect", icon = "fa-sun";
                    if (index !== -1) {
                        minTemp = Math.round(data.daily.temperature_2m_min[index]);
                        maxTemp = Math.round(data.daily.temperature_2m_max[index]);
                        const wmo = data.daily.weather_code[index];
                        if (wmo >= 51 && wmo <= 99) {
                            status = "rain_heavy";
                            icon   = (wmo >= 71 && wmo <= 77) ? "fa-snowflake" : "fa-umbrella";
                        } else if (maxTemp >= 30) {
                            status = "hot_core";
                            icon   = "fa-temperature-high";
                        } else {
                            status = "perfect";
                            icon   = (wmo === 0) ? "fa-sun" : (wmo <= 3 ? "fa-cloud-sun" : "fa-cloud");
                        }
                    }
                    return { ...d, minTemp, maxTemp, status, icon };
                });
            } catch (error) {
                console.error("날씨 데이터 로드 실패:", error);
                return datesInfo.map(d => ({ ...d, minTemp: 18, maxTemp: 25, status: "perfect", icon: "fa-sun" }));
            }
        }

                    points: ["외출 자제로 인한 배달 주문 폭증 대비 픽업 동선 정비 및 재고 확충", "비 오는 날 특수: 막걸리 발주 40% 상향 및 두부/김치 연관 진열", "가정간편식(HMR), 봉지라면 번들팩 등 쟁여두기 상품 발주 상향"] });
                guides.push({ target: "근무지 (오피스/공단)", icon: "fa-briefcase", color: "text-indigo-600", bg: "bg-indigo-50", border: "border-indigo-200",
                    points: ["점심시간 외부 식당 이동 감소 → 도시락, 조리면 등 식사 대용 FF 20% 증량", "매장 입구 비닐우산 및 장우산 대량 전면 배치", "오후 시간대 직장인 간식용 컵커피, 베이커리 다단 진열"] });
            } else {
                scriptText = "쾌적하고 맑은 날씨가 이어져 야외 나들이객이 많은 여행지 및 공원 주변 상권의 매출 활성화가 기대됩니다. 피크닉 용품 및 대용량 간편식 재고를 든든하게 채워주세요.";
                guides.push({ target: "여행지 / 유원지", icon: "fa-tree", color: "text-emerald-700", bg: "bg-emerald-50", border: "border-emerald-200",
                    points: ["나들이객 타겟 대용량 생수(2L), 캔맥주, RTD 하이볼 골든존 집중 진열", "가족 단위 식사용 프리미엄 도시락, 샌드위치, 샐러드 발주 확대", "돗자리, 종이컵, 물티슈, 선크림 등 야외활동 특화 가판 팝업 구성"] });
                guides.push({ target: "주거/학원가 복합", icon: "fa-school", color: "text-teal-600", bg: "bg-teal-50", border: "border-teal-200",
                    points: ["하교/퇴근 시간대 삼각김밥, 간편 조리빵 등 회전율 높은 FF 위주 전개", "10~20대 타겟 에너지드링크, 제로 탄산음료 냉장고 전면 노출", "카운터 FF (핫도그, 꼬치류) 하교 시간대 맞춤 조리"] });
            }

            if (matchedGames.length > 0) {
                let gamesStr = matchedGames.map(g => g.mdKey.replace('-', '/') + ' ' + g.matchInfo).join(', ');
                scriptText += "\n\n⚽ [빅 이벤트 안내] 이번 주 월드컵 주요 경기(" + gamesStr + ")가 예정되어 있습니다. 미국 현지 시차로 인한 새벽~오전 특수 상권 가이드를 확인하시고 아침 식사 대용식 및 각성 음료 위주로 발주를 대폭 강화해 주세요.";
                guides.unshift({
                    target: "🔥 월드컵 새벽·오전 특수 (시차 맞춤 공략)",
                    icon: "fa-futbol", color: "text-red-700", bg: "bg-red-50", border: "border-red-300",
                    points: [
                        "오전 경기 집관/응원족 집중: 경기 전후 취식 가능한 삼각김밥, 샌드위치, 줄김밥 등 식사 대용 FF류 발주 1.5배 상향",
                        "새벽~오전 각성 음료 특수: 카페25(원두커피), 에너지드링크, 캔커피 골든존 전면 진열 및 얼음컵 재고 최대 확보",
                        "새벽 경기 밤샘 대기족 타겟: 경기 전날 야간 시간대 홈술/야식용 컵라면, 냉장 안주, 스낵류 상시 노출 및 구색 강화",
                        "경기 종료 후 일상 복귀 대응: 시청 후 출근길 피로 회복을 위한 숙취해소제, 비타민 음료, 이온음료 번들 보강"
                    ]
                });
            }

            plainScriptText = scriptText;
            return { scriptText, guides };
        }

        async function calculateWeatherAndCoaching() {
            const now = new Date();
            document.getElementById("todayBadge").innerText = "현재 기준: " + now.getFullYear() + "." + (now.getMonth() + 1) + "." + now.getDate();

            const sigungu = document.getElementById("sigunguSelect").value;
            if (!sigungu) return;

            const coord = getSelectedCoord();

            document.getElementById("weeklyWeatherContainer").innerHTML =
                '<div class="col-span-full py-6"><div class="loader"></div><p class="text-center text-xs text-slate-500 mt-3">실시간 날씨 데이터를 불러오는 중입니다...</p></div>';

            const datesInfo = getDatesList(currentWeek);
            const forecast  = await fetchRealWeather(coord, datesInfo);

            let htmlWeather = "";
            let hotCount = 0, rainCount = 0;
            let matchedHolidays = [], matchedGames = [];

            forecast.forEach(item => {
                if (item.status === "hot_core")   hotCount++;
                if (item.status === "rain_heavy") rainCount++;
                if (item.holidayName) matchedHolidays.push(item);
                if (item.matchInfo)   matchedGames.push(item);

                let badge = item.status === "hot_core"
                    ? "<span class='text-[10px] bg-red-100 text-red-600 px-1 py-0.5 rounded font-bold'>폭염</span>"
                    : item.status === "rain_heavy"
                        ? "<span class='text-[10px] bg-blue-100 text-blue-600 px-1 py-0.5 rounded font-bold'>비/눈</span>"
                        : "<span class='text-[10px] bg-emerald-100 text-emerald-600 px-1 py-0.5 rounded font-bold'>맑음</span>";

                let dayClass   = item.isRedDay ? "text-red-600 font-extrabold" : "text-slate-600 font-bold";
                let holidayTag = item.holidayName
                    ? "<div class='absolute -top-2 right-0 text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full'>" + item.holidayName + "</div>"
                    : "";

                let gridMatchBadge = "";
                if (item.matchInfo) {
                    if (item.matchInfo.includes("대한민국")) {
                        let parts     = item.matchInfo.split('/');
                        let koPart    = parts.find(p => p.includes("대한민국")) || "";
                        let timeMatch = koPart.match(/(오전|오후)\s*\d+시/);
                        let timeStr   = timeMatch ? timeMatch[0] : "경기일";
                        gridMatchBadge = "<div class='text-[10px] bg-red-600 text-white font-extrabold px-1.5 py-0.5 rounded mt-1 pulse-badge'>⚽ 韓 (" + timeStr + ")</div>";
                    } else {
                        gridMatchBadge = "<div class='text-[10px] bg-slate-200 text-slate-700 font-medium px-1 py-0.5 rounded mt-1'>⚽ 월드컵</div>";
                    }
                }

                htmlWeather +=
                    "<div class='relative flex flex-col items-center justify-between p-2.5 bg-slate-50 rounded-xl border border-slate-200 text-center space-y-1 min-h-[135px]'>" +
                    holidayTag +
                    "<div class='text-[11px] text-slate-400 font-medium'>" + item.dateString + "</div>" +
                    "<div class='text-xs " + dayClass + "'>" + item.dayLabel + "요일</div>" +
                    "<i class='fa-solid " + item.icon + " text-slate-400 text-sm'></i>" +
                    "<div class='font-bold text-[11px] text-slate-800'><span class='text-blue-500'>" + item.minTemp + "℃</span> / <span class='text-red-500'>" + item.maxTemp + "℃</span></div>" +
                    "<div class='flex flex-col items-center space-y-1 w-full'>" + badge + gridMatchBadge + "</div>" +
                    "</div>";
            });

            document.getElementById("weeklyWeatherContainer").innerHTML = htmlWeather;

            const eventContainer = document.getElementById("eventTextContainer");
            let eventHtml = "";

            if (matchedHolidays.length > 0) {
                let hStr = matchedHolidays.map(h => h.dateString + "(" + h.dayLabel + ") " + h.holidayName).join(', ');
                eventHtml += "<p class='text-sm font-bold text-red-600'><i class='fa-regular fa-calendar-check mr-1.5'></i>" + hStr + "</p>";
            }
            if (matchedGames.length > 0) {
                let gStr = matchedGames.map(g => {
                    let parts = g.matchInfo.split('/');
                    let highlightedParts = parts.map(p => {
                        let trimmed = p.trim();
                        if (trimmed.includes("대한민국")) {
                            return "<span class='text-red-600 font-extrabold bg-red-50 px-2 py-0.5 rounded border-2 border-red-500 mx-0.5 inline-block'>🔥 " + trimmed + "</span>";
                        }
                        return "<span class='text-slate-600 font-medium'>" + trimmed + "</span>";
                    });
                    return "<div class='flex items-center flex-wrap gap-1 bg-white p-2 rounded-lg border border-slate-200 w-full'>" +
                        "<span class='text-blue-700 font-extrabold bg-blue-50 px-2 py-0.5 rounded border border-blue-200 mr-1.5'>" + g.dateString + "(" + g.dayLabel + ")</span> " +
                        highlightedParts.join(' <span class="text-slate-300">/</span> ') + "</div>";
                }).join('');
                eventHtml += "<div class='text-sm font-bold text-slate-900 flex flex-col gap-1.5 w-full'>" +
                    "<div class='flex items-center text-blue-700 font-bold'><i class='fa-solid fa-futbol mr-1.5'></i>2026 월드컵 주요 경기 상세 일정</div>" + gStr + "</div>";
            }

            if (eventHtml === "") {
                eventContainer.classList.add("hidden");
                eventContainer.classList.remove("flex");
            } else {
                eventContainer.classList.remove("hidden");
                eventContainer.classList.add("flex");
                eventContainer.innerHTML = eventHtml;
            }

            let primaryWeather = "perfect";
            if      (hotCount  >= 3) primaryWeather = "hot_core";
            else if (rainCount >= 2) primaryWeather = "rain_heavy";

            const { scriptText, guides } = buildUnifiedGuide(primaryWeather, matchedHolidays, matchedGames);

            let formattedScript = scriptText.replace(/\n/g, '<br>');
            formattedScript = formattedScript.replace(
                /((오전|오후)\s*\d+시[^\/]*?대한민국\s*vs\s*[가-힣\s]+|대한민국 준결승 경기)/g,
                '<span class="text-red-600 font-extrabold bg-red-50 px-1 rounded border border-red-300">$1</span>'
            );
            document.getElementById("coachingQuote").innerHTML = formattedScript;

            let guidesHtml = "";
            guides.forEach(g => {
                let lis = g.points.map(p =>
                    "<li class='flex items-start'><i class='fa-solid fa-check text-[10px] mt-1 mr-2 opacity-60'></i><span>" + p + "</span></li>"
                ).join('');
                guidesHtml +=
                    "<div class='p-4 rounded-xl border " + g.bg + " " + g.border + "'>" +
                    "<h4 class='font-bold text-sm " + g.color + " mb-2.5 flex items-center'><i class='fa-solid " + g.icon + " mr-1.5'></i> " + g.target + "</h4>" +
                    "<ul class='text-xs text-slate-700 space-y-1.5 leading-relaxed font-medium'>" + lis + "</ul>" +
                    "</div>";
            });
            document.getElementById("dynamicGuidesContainer").innerHTML = guidesHtml;
        }

        function copyScript() {
            if (!plainScriptText) {
                alert("먼저 지역을 선택하여 가이드를 생성해 주세요.");
                return;
            }
            navigator.clipboard.writeText(plainScriptText).then(() => {
                alert("종합 코칭 가이드 요약이 클립보드에 복사되었습니다.\n경영주님 소통 채널에 즉시 활용하세요!");
            }).catch(() => {
                alert("복사에 실패했습니다. 브라우저 권한을 확인해 주세요.");
            });
        }

        window.onload = function () {
            updateSigungu();
        };
    </script>
