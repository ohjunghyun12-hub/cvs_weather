<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS25 주간 날씨 연동형 발주 코칭 대시보드</title>
    <!-- Tailwind CSS 및 FontAwesome 아이콘 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-12">

    <!-- 상단 헤더 -->
    <header class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cloud-sun-rain text-2xl text-cyan-200"></i>
                <h1 class="text-xl font-bold tracking-tight">GS25 지역 날씨 연동 발주 코칭 대시보드</h1>
            </div>
            <div class="bg-blue-900/50 px-3 py-1 rounded text-xs font-medium">OFC 전용 현장지도 도구</div>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <main class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 왼쪽: 조건 선택 및 주간 기상 정보 -->
        <section class="lg:col-span-1 space-y-6">
            
            <!-- 환경 설정 카드 -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 space-y-4">
                <div class="border-b border-slate-100 pb-2">
                    <h2 class="font-bold text-slate-900 flex items-center"><i class="fa-solid fa-map-location-dot text-blue-600 mr-2"></i>지역 및 시점 선택</h2>
                </div>

                <!-- 1. 지역 선택 (시/도 및 시/군/구 예시) -->
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/도</label>
                        <select id="sidoSelect" onchange="updateSigungu()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="seoul">서울특별시</option>
                            <option value="gyeonggi">경기도</option>
                            <option value="busan">부산광역시</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/군/구</label>
                        <select id="sigunguSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <!-- 자바스크립트에서 동적 생성 -->
                        </select>
                    </div>
                </div>

                <!-- 2. 주차 선택 (금주 / 차주) -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">코칭 대상 주차</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnThisWeek" onclick="setWeek('this')" class="py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600">금주 예보</button>
                        <button id="btnNextWeek" onclick="setWeek('next')" class="py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50">차주 예보</button>
                    </div>
                </div>

                <!-- 3. GS25 표준 상권 분류 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">점포 상권 유형</label>
                    <select id="sangkwonSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="apart">아파트주거</option>
                        <option value="villa">빌라주거</option>
                        <option value="single">소가구주거</option>
                        <option value="work">근무지(오피스/공단)</option>
                        <option value="hotplace">유동강세(대학가/번화가)</option>
                        <option value="travel">旅行지 / 유원지</option>
                        <option value="special">특수/기타(교내, 병원, 터미널 등)</option>
                    </select>
                </div>

                <!-- 4. 특수 이벤트 체크 -->
                <div class="flex items-center pt-1">
                    <input type="checkbox" id="worldcupCheck" checked onchange="calculateWeatherAndCoaching()" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500">
                    <label for="worldcupCheck" class="ml-2 text-xs font-bold text-slate-700 select-none flex items-center">
                        <span>6월 월드컵 경기 일정 포함</span>
                        <span class="ml-1.5 bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded-full">특수</span>
                    </label>
                </div>
            </div>

            <!-- 선택 지역 주간 날씨 모니터링 판넬 -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200">
                <div class="border-b border-slate-100 pb-2 mb-3">
                    <h3 class="font-bold text-slate-900 text-sm flex items-center"><i class="fa-solid fa-calendar-week text-cyan-600 mr-2"></i>주간 기상 분석 결과</h3>
                </div>
                <div id="weeklyWeatherContainer" class="space-y-2">
                    <!-- 자바스크립트로 요일별 주간 날씨 카드 렌더링 -->
                </div>
            </div>
        </section>

        <!-- 오른쪽: 실시간 주간 날씨 연동 코칭 솔루션 출력부 -->
        <section class="lg:col-span-2 space-y-6">
            
            <!-- 점주 대화용 실시간 브리핑 요약 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center">
                        <i class="fa-solid fa-comment-sms text-cyan-500 mr-2"></i>
                        OFC 현장 경영주 발주 코칭 스크립트
                    </h2>
                    <button onclick="copyScript()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1.5 rounded flex items-center transition">
                        <i class="fa-regular fa-copy mr-1"></i> 스크립트 복사
                    </button>
                </div>
                <blockquote id="coachingQuote" class="bg-slate-50 border-l-4 border-blue-600 p-4 rounded-r-lg text-slate-700 text-xs sm:text-sm leading-relaxed font-medium whitespace-pre-line">
                    기상 데이터를 분석하여 실시간 멘트를 생성 중입니다...
                </blockquote>
            </div>

            <!-- 카테고리별 상세 발주 가이드라인 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200 space-y-5">
                <div class="border-b border-slate-100 pb-2">
                    <h3 class="font-bold text-slate-900 text-sm flex items-center"><i class="fa-solid fa-boxes-stacked text-indigo-600 mr-2"></i>카테고리별 종합 발주 가이드</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 1. FRESH FOOD -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-cyan-700 mb-2 flex items-center">
                            <i class="fa-solid fa-box-tissue mr-1.5"></i> FRESH FOOD (FF)
                        </h4>
                        <p id="ffContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 2. 카운터 FF -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-orange-700 mb-2 flex items-center">
                            <i class="fa-solid fa-drumstick-bite mr-1.5"></i> 카운터FF (즉석조리)
                        </h4>
                        <p id="counterFfContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 3. 주류 / 음료 -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-blue-700 mb-2 flex items-center">
                            <i class="fa-solid fa-beer-mug-empty mr-1.5"></i> 주류 / 음료 카테고리
                        </h4>
                        <p id="drinkContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>

                    <!-- 4. 일반상품 / 아이스 / 비식품 -->
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <h4 class="font-bold text-xs sm:text-sm text-purple-700 mb-2 flex items-center">
                            <i class="fa-solid fa-snowflake mr-1.5"></i> 아이스 / 가공 / 비식품
                        </h4>
                        <p id="generalContent" class="text-xs text-slate-600 leading-relaxed whitespace-pre-line"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 날씨 시뮬레이션 및 데이터 매핑 엔진 로직 -->
    <script>
        // 시군구 가상 날씨 데이터 마스터 테이블 (5월 말 ~ 6월 초 가정 데이터셋)
        const weatherDatabase = {
            seoul: {
                gangnam: {
                    this: [
                        { day: "월", temp: 24, status: "perfect", icon: "fa-sun" },
                        { day: "화", temp: 26, status: "hot_early", icon: "fa-sun" },
                        { day: "수", temp: 27, status: "hot_early", icon: "fa-sun" },
                        { day: "목", temp: 28, status: "hot_early", icon: "fa-cloud-sun" },
                        { day: "금", temp: 25, status: "shower", icon: "fa-cloud-showers-heavy" },
                        { day: "토", temp: 26, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 27, status: "hot_early", icon: "fa-sun" }
                    ],
                    next: [
                        { day: "월", temp: 30, status: "hot_early", icon: "fa-sun" },
                        { day: "화", temp: 33, status: "hot_core", icon: "fa-temperature-high" },
                        { day: "수", temp: 34, status: "hot_core", icon: "fa-temperature-high" },
                        { day: "목", temp: 29, status: "shower", icon: "fa-cloud-rain" },
                        { day: "금", temp: 24, status: "rain_heavy", icon: "fa-umbrella" },
                        { day: "토", temp: 23, status: "rain_heavy", icon: "fa-umbrella" },
                        { day: "일", temp: 26, status: "hot_early", icon: "fa-sun" }
                    ]
                },
                jongno: {
                    this: [
                        { day: "월", temp: 23, status: "perfect", icon: "fa-sun" },
                        { day: "화", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "수", temp: 24, status: "perfect", icon: "fa-cloud" },
                        { day: "목", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "금", temp: 22, status: "shower", icon: "fa-cloud-rain" },
                        { day: "토", temp: 26, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 26, status: "hot_early", icon: "fa-sun" }
                    ],
                    next: [
                        { day: "월", temp: 29, status: "hot_early", icon: "fa-sun" },
                        { day: "화", temp: 31, status: "hot_early", icon: "fa-sun" },
                        { day: "수", temp: 33, status: "hot_core", icon: "fa-temperature-high" },
                        { day: "목", temp: 32, status: "hot_early", icon: "fa-cloud-sun" },
                        { day: "금", temp: 28, status: "hot_early", icon: "fa-sun" },
                        { day: "토", temp: 27, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 28, status: "hot_early", icon: "fa-sun" }
                    ]
                }
            },
            gyeonggi: {
                suwon: {
                    this: [
                        { day: "월", temp: 24, status: "perfect", icon: "fa-sun" },
                        { day: "화", temp: 26, status: "hot_early", icon: "fa-sun" },
                        { day: "수", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "목", temp: 23, status: "shower", icon: "fa-cloud-rain" },
                        { day: "금", temp: 22, status: "shower", icon: "fa-cloud-rain" },
                        { day: "토", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 26, status: "hot_early", icon: "fa-sun" }
                    ],
                    next: [
                        { day: "월", temp: 28, status: "hot_early", icon: "fa-sun" },
                        { day: "화", temp: 30, status: "hot_early", icon: "fa-sun" },
                        { day: "수", temp: 32, status: "hot_early", icon: "fa-sun" },
                        { day: "목", temp: 33, status: "hot_core", icon: "fa-temperature-high" },
                        { day: "금", temp: 31, status: "hot_early", icon: "fa-sun" },
                        { day: "토", temp: 29, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 28, status: "hot_early", icon: "fa-sun" }
                    ]
                }
            },
            busan: {
                haeundae: {
                    this: [
                        { day: "월", temp: 22, status: "perfect", icon: "fa-sun" },
                        { day: "화", temp: 23, status: "perfect", icon: "fa-sun" },
                        { day: "수", temp: 24, status: "perfect", icon: "fa-cloud-sun" },
                        { day: "목", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "금", temp: 26, status: "hot_early", icon: "fa-sun" },
                        { day: "토", temp: 27, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 26, status: "hot_early", icon: "fa-sun" }
                    ],
                    next: [
                        { day: "월", temp: 25, status: "hot_early", icon: "fa-sun" },
                        { day: "화", temp: 24, status: "rain_heavy", icon: "fa-umbrella" },
                        { day: "수", temp: 23, status: "rain_heavy", icon: "fa-umbrella" },
                        { day: "목", temp: 25, status: "shower", icon: "fa-cloud-rain" },
                        { day: "금", temp: 28, status: "hot_early", icon: "fa-sun" },
                        { day: "토", temp: 30, status: "hot_early", icon: "fa-sun" },
                        { day: "일", temp: 31, status: "hot_early", icon: "fa-sun" }
                    ]
                }
            }
        };

        const sigunguLabels = {
            gangnam: "강남구", jongno: "종로구", suwon: "수원시", haeundae: "해운대구"
        };

        let currentWeek = 'this'; // 기본값 금주

        // 시도 선택 변경 시 시군구 자동 동적 드롭다운 세팅
        function updateSigungu() {
            const sido = document.getElementById("sidoSelect").value;
            const sigunguSelect = document.getElementById("sigunguSelect");
            sigunguSelect.innerHTML = "";

            let options = "";
            if (sido === "seoul") {
                options += `<option value="gangnam">강남구</option><option value="jongno">종로구</option>`;
            } else if (sido === "gyeonggi") {
                options += `<option value="suwon">수원시</option>`;
            } else if (sido === "busan") {
                options += `<option value="haeundae">해운대구</option>`;
            }
            sigunguSelect.innerHTML = options;
            calculateWeatherAndCoaching();
        }

        // 주차 토글 버튼 제어 함수
        function setWeek(week) {
            currentWeek = week;
            const btnThis = document.getElementById("btnThisWeek");
            const btnNext = document.getElementById("btnNextWeek");

            if(week === 'this') {
                btnThis.className = "py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600";
                btnNext.className = "py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50";
            } else {
                btnNext.className = "py-2 text-xs font-bold rounded-lg border bg-blue-600 text-white border-blue-600";
                btnThis.className = "py-2 text-xs font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50";
            }
            calculateWeatherAndCoaching();
        }

        // 핵심 연동 및 알고리즘 판정 엔진
        function calculateWeatherAndCoaching() {
            const sido = document.getElementById("sidoSelect").value;
            const sigungu = document.getElementById("sigunguSelect").value;
            const sangkwon = document.getElementById("sangkwonSelect").value;
            const isWorldcup = document.getElementById("worldcupCheck").checked;

            // 주간 예보 데이터 가져오기
            const forecast = weatherDatabase[sido][sigungu][currentWeek];

            // 1. 좌측 화면에 요일별 날씨 카드 실시간 시각화
            const container = document.getElementById("weeklyWeatherContainer");
            container.innerHTML = "";
            
            forecast.forEach(item => {
                let statusBadge = "";
                if(item.status === "hot_core") statusBadge = "<span class='text-[10px] bg-red-100 text-red-600 px-1 rounded font-bold'>폭염</span>";
                else if(item.status === "hot_early") statusBadge = "<span class='text-[10px] bg-orange-100 text-orange-600 px-1 rounded font-bold'>초여름</span>";
                else if(item.status === "shower" || item.status === "rain_heavy") statusBadge = "<span class='text-[10px] bg-blue-100 text-blue-600 px-1 rounded font-bold'>우천</span>";
                else statusBadge = "<span class='text-[10px] bg-emerald-100 text-emerald-600 px-1 rounded font-bold'>쾌청</span>";

                container.innerHTML += `
                    <div class="flex items-center justify-between p-2 bg-slate-50 rounded-lg border border-slate-200 text-xs">
                        <span class="font-bold w-6">${item.day}</span>
                        <i class="fa-solid ${item.icon} text-slate-500 text-sm"></i>
                        <span class="font-semibold text-slate-700">${item.temp}℃</span>
                        ${statusBadge}
                    </div>
                `;
            });

            // 2. 주간 대표 날씨 및 리스크 요인 종합 판정 알고리즘
            let countHotCore = 0, countHotEarly = 0, countRain = 0;
            forecast.forEach(f => {
                if(f.status === "hot_core") countHotCore++;
                if(f.status === "hot_early") countHotEarly++;
                if(f.status === "shower" || f.status === "rain_heavy") countRain++;
            });

            // 메인 지배 날씨 도출
            let primaryWeather = "perfect";
            if (countHotCore >= 2) primaryWeather = "hot_core";
            else if (countRain >= 2) primaryWeather = "rain_heavy";
            else if (countHotEarly >= 3) primaryWeather = "hot_early";

            // 3. 동적 텍스트 및 카테고리 솔루션 매칭
            let scriptText = `안녕하세요 점주님! 이번 ${currentWeek === 'this' ? '금주' : '차주'} 해당 지역은 `;
            if(primaryWeather === "hot_core") scriptText += "최고 33도 이상 올라가는 한여름 폭염 일수가 많아 야간 객수가 크게 살아날 전망입니다. ";
            else if(primaryWeather === "rain_heavy") scriptText += "주간 내 비 소식이 빈번하게 예고되어 있어 내점객수가 감소할 우려가 있으나 목적구매 상품 위주로 방어가 필요합니다. ";
            else if(primaryWeather === "hot_early") scriptText += "25도에서 30도를 웃도는 완연한 초여름 성수기 기온을 보여 아이스 카테고리 회전이 가속화될 예정입니다. ";
            else scriptText += "나들이 가기 좋은 평온하고 화창한 봄/가을 기온이 예상됩니다. ";

            // 상권 믹싱
            if(sangkwon === "apart" || sangkwon === "villa" || sangkwon === "single") {
                scriptText += "특히 주거밀착 상권 특성상 주말 및 야간 시간대 집콕 야식과 주류 수요 유입이 극대화되는 시점이니 매대 풀-진열이 무조건 수반되어야 합니다.";
            } else if(sangkwon === "work") {
                scriptText += "오피스/근무지 상권인 만큼 주말 공동화 현상을 대비해 주중 피크타임(오전/점심) 단기 회전 가이드에 전력해야 합니다.";
            } else {
                scriptText += "외부 유동인구가 집중되는 골든 구간이므로 즉시 취식성 상품 회전율 방어가 핵심입니다.";
            }

            // 카테고리별 세부 제안서 생성
            let ff = "", counterFf = "", drink = "", general = "";

            if (primaryWeather === "hot_core" || primaryWeather === "hot_early") {
                ff = "• 날씨가 무더워짐에 따라 샌드위치, 주먹밥 카테고리 수요 증가. 발주량 평시 대비 15% 상향.\n• 조리빵류 비중을 소폭 낮추고 비빔/냉면류 간편식 전면 진열 유도.";
                counterFf = "• 카페25 아이스 아메리카노 및 스무디 원재료(얼음컵, 빨대, 컵홀더) 결품 제로(0)화 발주 진행.\n• 치킨25 소형 스낵류 수시 조리 배치.";
                drink = "• 제로 탄산음료, 이온음료, 대용량 페트 차음료 라인업 WIC 다단 진열 확대.\n• 수입/국산 캔맥주 멀티팩 번들 재고 상향 확보.";
                general = "• 유어스 컵얼음 전 규격(일반/빅/대용량) 평소 대비 1.5배 이상 진열 전개.\n• 빙과류(튜브형) 발주 중심 이동 및 선크림/데오드란트 전면 가판 유치.";
            } else if (primaryWeather === "rain_heavy") {
                ff = "• 우천 리스크 감안하여 FRESH FOOD(도시락, 김밥, 샌드위치) 전체 라인업 발주 15~20% 과감히 축소하여 폐기 제어.";
                counterFf = "• 치킨25, 고피자 즉석조리는 사전 조리 수량을 타이트하게 제어하고 주문 즉시 조리 방식으로 전환 안내.";
                drink = "• [비오는날 특수] 막걸리(전통주) 전 브랜드 발주 30% 증가 및 소주 카테고리 상향 전개.";
                general = "• [카운터 필수] 장우산, 일회용 비닐우산 즉시 계산대 옆 골든존 이동 진열.\n• 홈타입 가공밥(햇반 등), 번들 봉지라면 멀티팩 발주 보강.";
            } else {
                ff = "• 야외 활동에 적합한 줄김밥, 소풍용 도시락, 햄버거/샌드위치 완제품 카테고리 발주 20% 상향 조정.";
                counterFf = "• 카페25 전 음료 원재료 균등 확보.\n• 나들이 나가는 유동 타임에 맞춰 치킨25 대표 치킨 및 꼬치류 상시 워머 만재 조치.";
                drink = "• 나들이족 타겟 소용량 생수(500ml), 캔맥주, 수입 와인 회전율 체크 및 WIC 최하단 적재.";
                general = "• 여행/이동용 물티슈, 휴대용 휴지, 돗자리 가판대 거치.\n• 껌, 젤리, 캔디류 카운터 앞 연관 진열 확대.";
            }

            // 6월 월드컵 스페셜 엔진 강제 결합 분기
            if (isWorldcup) {
                scriptText += " 추가로 6월 월드컵 야간 경기 일정이 포함되어 있어 치킨집 배달 지연 대피 고객이 편의점으로 폭발적으로 유입될 대목입니다. 당일 기회손실이 절대 없도록 강력 매니지먼트 부탁드립니다.\"";
                ff += "\n⚽ [월드컵 추가] 경기 보며 먹기 좋은 족발, 편육, 닭발 등 간편식 안주류 발주 50% 과감히 증량!";
                counterFf += "\n⚽ [월드컵 추가] 치킨25(쏜살치킨 등) 원재료 발주 200% 상향 및 전날 사전 확보! 경기 시작 2시간 전 워머 풀(Full)조리 전개. 고피자 도우 재고 상향.";
                drink += "\n⚽ [월드컵 추가] 국산/수입 캔맥주 대란 대비 경기 전날 WIC 쇼케이스 후방 최대로 밀어넣기 적재(미지근한 맥주 판매 시 기회손실 발생).";
                general += "\n⚽ [월드컵 추가] 안주용 마른안주(육포, 오징어), 대형 봉지스낵류 계산대 매대 돌출 전개.";
            } else {
                scriptText += "\"";
            }

            document.getElementById("coachingQuote").innerText = scriptText;
            document.getElementById("ffContent").innerText = ff;
            document.getElementById("counterFfContent").innerText = counterFf;
            document.getElementById("drinkContent").innerText = drink;
            document.getElementById("generalContent").innerText = general;
        }

        // 스크립트 복사 기능
        function copyScript() {
            const text = document.getElementById("coachingQuote").innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("날씨 연동 코칭 스크립트가 복사되었습니다.\n경영주님과의 대화창이나 업무시스템에 붙여넣어 활용해 주세요.");
            });
        }

        // 초기 화면 로드 시 세팅
        window.onload = function() {
            updateSigungu();
        };
    </script>
