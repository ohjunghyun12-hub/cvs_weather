<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS25 지역별 주간 날씨 및 발주 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pulse-badge { animation: pulse 1.5s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    </style>
</head>
<body class="text-slate-800 antialiased pb-12">

    <header class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cloud-sun-rain text-2xl text-cyan-200"></i>
                <h1 class="text-xl font-bold tracking-tight">GS25 지역별 주간 날씨 및 발주 가이드</h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
        
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 space-y-4">
                <div class="border-b border-slate-100 pb-2 mb-3">
                    <h2 class="font-bold text-slate-900 flex items-center"><i class="fa-solid fa-map-location-dot text-blue-600 mr-2"></i>지역 및 주차 선택</h2>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/도</label>
                        <select id="sidoSelect" onchange="updateSigungu()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="daejeon">대전광역시</option>
                            <option value="sejong">세종특별자치시</option>
                            <option value="chungnam">충청남도</option>
                            <option value="gwangju">광주광역시</option>
                            <option value="jeonbuk">전북특별자치도</option>
                            <option value="jeonnam">전라남도</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/군/구</label>
                        <select id="sigunguSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1">코칭 대상 주차</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnThisWeek" onclick="setWeek('this')" class="py-2.5 text-sm font-bold rounded-lg border bg-blue-600 text-white border-blue-600 transition">금주 예보</button>
                        <button id="btnNextWeek" onclick="setWeek('next')" class="py-2.5 text-sm font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50 transition">차주 예보</button>
                    </div>
                </div>
                
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 text-xs text-blue-800 leading-relaxed">
                    <i class="fa-solid fa-circle-info mr-1"></i>
                    선택하신 <b>실시간 날씨</b>와 해당 주간의 <b>이벤트(월드컵/공휴일)</b>를 자동 분석하여 가장 중요한 상권 맞춤 가이드를 제공합니다.
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 lg:col-span-2 flex flex-col justify-between">
                <div>
                    <div class="border-b border-slate-100 pb-2 mb-4 flex justify-between items-center">
                        <h3 class="font-bold text-slate-900 text-sm flex items-center">
                            <i class="fa-solid fa-calendar-week text-cyan-600 mr-2"></i> 주간 기상 분석
                        </h3>
                        <span id="todayBadge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-md"></span>
                    </div>
                    <div id="weeklyWeatherContainer" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2 min-h-[135px] items-center justify-center">
                    </div>
                </div>
                
                <div id="eventTextContainer" class="mt-4 p-3 bg-slate-50 rounded-lg border border-slate-200 min-h-[48px] flex-col justify-center space-y
