<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS25 지역별 주간 날씨 및 스마트 발주 가이드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-12">

    <!-- 상단 헤더 -->
    <header class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cloud-sun-rain text-2xl text-cyan-200"></i>
                <h1 class="text-xl font-bold tracking-tight">GS25 스마트 주간 발주 가이드</h1>
            </div>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
        
        <!-- 상단 영역: 조건 선택 및 주간 기상/이벤트 정보 -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 좌측 컨트롤러 (간소화됨) -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 space-y-4">
                <div class="border-b border-slate-100 pb-2 mb-3">
                    <h2 class="font-bold text-slate-900 flex items-center"><i class="fa-solid fa-map-location-dot text-blue-600 mr-2"></i>지역 및 주차 선택</h2>
                </div>

                <!-- 1. 지역 선택 -->
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/도</label>
                        <select id="sidoSelect" onchange="updateSigungu()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="daejeon">대전광역시</option>
                            <option value="sejong">세종특별자치시</option>
                            <option value="chungnam">충청남도</option>
                            <option value="gwangju">광주광역시</option>
                            <option value="jeonbuk">전북특별자치도</option>
                            <option value="jeonnam">전라남도</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">시/군/구</label>
                        <select id="sigunguSelect" onchange="calculateWeatherAndCoaching()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></select>
                    </div>
                </div>

                <!-- 2. 주차 선택 -->
                <div class="mb-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1">코칭 대상 주차</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnThisWeek" onclick="setWeek('this')" class="py-2.5 text-sm font-bold rounded-lg border bg-blue-600 text-white border-blue-600 transition">금주 예보</button>
                        <button id="btnNextWeek" onclick="setWeek('next')" class="py-2.5 text-sm font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50 transition">차주 예보</button>
                    </div>
                </div>
                
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 text-xs text-blue-800 leading-relaxed">
                    <i class="fa-solid fa-circle-info mr-1"></i>
                    선택하신 <b>날씨</b>와 해당 주간의 <b>이벤트(월드컵/공휴일)</b>를 자동 분석하여 가장 중요한 상권 맞춤 가이드를 제공합니다.
                </div>
            </div>

            <!-- 우측 날씨 및 이벤트 패널 -->
            <div class="bg-white rounded-xl shadow-sm p-5 border border-slate-200 lg:col-span-2 flex flex-col justify-between">
                <div>
                    <div class="border-b border-slate-100 pb-2 mb-4 flex justify-between items-center">
                        <h3 class="font-bold text-slate-900 text-sm flex items-center">
                            <i class="fa-solid fa-calendar-week text-cyan-600 mr-2"></i> 주간 기상 분석
                        </h3>
                        <span id="todayBadge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-md"></span>
                    </div>
                    <div id="weeklyWeatherContainer" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2.5">
                        <!-- 날씨 데이터 렌더링 -->
                    </div>
                </div>
                
                <!-- 이벤트(공휴일/월드컵) 텍스트 표시 영역 -->
                <div id="eventTextContainer" class="mt-4 p-3 bg-slate-50 rounded-lg border border-slate-200 min-h-[48px] flex flex-col justify-center space-y-1">
                    <!-- 스크립트에서 자동 주입 -->
                </div>
            </div>
        </section>

        <!-- 하단 영역: 통합 스마트 발주 코칭 가이드 -->
        <section class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-5">
                <h2 class="text-base font-bold text-slate-900 flex items-center">
                    <i class="fa-solid fa-lightbulb text-yellow-500 mr-2"></i> 기상/이벤트 기반 주간 발주 핵심 가이드
                </h2>
                <button onclick="copyScript()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg flex items-center transition font-bold border border-slate-200">
                    <i class="fa-regular fa-copy mr-1.5"></i> 코칭 스크립트 복사
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 통합 코칭 스크립트 -->
                <div class="md:col-span-1">
                    <h3 class="text-xs font-bold text-slate-500 mb-2">경영주 전파용 요약 스크립트</h3>
                    <blockquote id="coachingQuote" class="bg-blue-50 border-l-4 border-blue-600 p-4 rounded-r-lg text-slate-800 text-sm leading-relaxed font-medium whitespace-pre-line shadow-sm">
                        <!-- 동적 텍스트 생성 -->
                    </blockquote>
                </div>
                
                <!-- 핵심 상권 타겟 가이드 -->
                <div class="md:col-span-2 space-y-3">
                    <h3 class="text-xs font-bold text-slate-500 mb-2">이번 주 집중 공략 상권 가이드 (날씨 영향도 반영)</h3>
                    <div id="dynamicGuidesContainer" class="space-y-3">
                        <!-- 동적 카드 생성 -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 비즈니스 로직 스크립트 -->
    <script>
        const regionStructure = {
            daejeon: ["동구", "중구", "서구", "유성구", "대덕구"],
            sejong: ["세종특별자치시"],
            chungnam: ["천안시 동남구", "천안시 서북구", "공주시", "아산시", "서산시", "당진시", "보령시"],
            gwangju: ["동구", "서구", "남구", "북구", "광산구"],
            jeonbuk: ["전주시 완산구", "전주시 덕진구", "군산시", "익산시", "정읍시"],
            jeonnam: ["목포시", "여수시", "순천시", "나주시", "광양시"]
        };

        const sidoLabels = {
            daejeon: "대전광역시", sejong: "세종특별자치시", chungnam: "충청남도",
            gwangju: "광주광역시", jeonbuk: "전북특별자치도", jeonnam: "전라남도"
        };

        const nationalHolidays = {
            "06-06": "현충일", "08-15": "광복절", "10-03": "개천절", "10-09": "한글날"
        };

        const worldCupMatches = {
            "06-12": "오전 11시, vs 체코",
            "06-19": "오전 10시, vs 멕시코",
            "06-25": "오전 10시, vs 남아프리카 공화국",
            "07-15": "준결승 경기",
            "07-19": "결승 경기"
        };

        let currentWeek = 'this';
        let plainScriptText = ""; // 복사용 텍스트

        function updateSigungu() {
            const sido = document.getElementById("sidoSelect").value;
            const select = document.getElementById("sigunguSelect");
            select.innerHTML = "";
            regionStructure[sido].forEach(name => {
                const opt = document.createElement("option"); opt.value = name; opt.textContent = name;
                select.appendChild(opt);
            });
            calculateWeatherAndCoaching();
        }

        function setWeek(week) {
            currentWeek = week;
            document.getElementById("btnThisWeek").className = (week === 'this' ? "py-2.5 text-sm font-bold rounded-lg border bg-blue-600 text-white border-blue-600 transition" : "py-2.5 text-sm font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50 transition");
            document.getElementById("btnNextWeek").className = (week === 'next' ? "py-2.5 text-sm font-bold rounded-lg border bg-blue-600 text-white border-blue-600 transition" : "py-2.5 text-sm font-bold rounded-lg border bg-white text-slate-600 border-slate-300 hover:bg-slate-50 transition");
            calculateWeatherAndCoaching();
        }

        // 기준일(2026-06-03) 바탕으로 날짜 계산
        function getDatesList(week) {
            const baseDate = new Date("2026-06-03T10:14:10"); 
            if (week === 'next') baseDate.setDate(baseDate.getDate() + 7);
            
            const daysShort = ["일", "월", "화", "수", "목", "금", "토"];
            let result = [];
            for(let i=0; i<7; i++) {
                let d = new Date(baseDate);
                d.setDate(baseDate.getDate() + i);
                let mm = String(d.getMonth() + 1).padStart(2, '0');
                let dd = String(d.getDate()).padStart(2, '0');
                let mdKey = `${mm}-${dd}`;
                
                result.push({
                    mdKey: mdKey,
                    dateString: `${d.getMonth() + 1}/${d.getDate()}`,
                    dayLabel: daysShort[d.getDay()],
                    isRedDay: (d.getDay() === 0 || !!nationalHolidays[mdKey]),
                    holidayName: nationalHolidays[mdKey] || null,
                    matchInfo: worldCupMatches[mdKey] || null
                });
            }
            return result;
        }

        function generateFakeForecast(seedName, week) {
            const datesInfo = getDatesList(week);
            const hash = seedName.charCodeAt(0) || 0;
            return datesInfo.map((d, i) => {
                let temp = 22, status = "perfect", icon = "fa-sun";
                if (hash % 3 === 0) {
                    temp = 21 + (i % 3);
                    status = (i === 3 || i === 4) ? "rain_heavy" : "perfect";
                    icon = (i === 3 || i === 4) ? "fa-umbrella" : "fa-sun";
                } else if (hash % 3 === 1) {
                    temp = 29 + (i % 4);
                    status = "hot_core";
                    icon = "fa-temperature-high";
                } else {
                    temp = 24 + (i % 3);
                }
                return { ...d, temp, status, icon };
            });
        }

        function buildUnifiedGuide(primaryWeather, matchedHolidays, matchedGames) {
            let guides = [];
            let scriptText = "";

            // 기본 기상 타겟 상권
            if (primaryWeather === "hot_core") {
                scriptText = "이번 주 무더운 폭염 날씨로 인해 유동인구가 많은 번화가와 야간 거주지 상권의 빙과, 음료 수요가 급증할 예정입니다. 아이스컵과 주류 재고 확보에 만전을 기해주십시오.";
                guides.push({ target: "유동강세 (역세권/번화가)", icon: "fa-fire", color: "text-orange-600", bg: "bg-orange-50", border: "border-orange-200", points: ["아이스컵(일반/빅), 파우치 음료, 500ml 생수 전면 배치 및 재고 최대치 확보", "야간 유동인구 증가 대비 소형 컵과일, 아이스크림 보강", "이동 취식형 완제품(줄김밥, 햄버거) 결품 주의 및 카페25 기기 점검"] });
                guides.push({ target: "주거밀착 (아파트/빌라)", icon: "fa-building", color: "text-blue-600", bg: "bg-blue-50", border: "border-blue-200", points: ["열대야 대비 야간 홈술족 타겟 국산/수입 캔맥주 번들(4캔) 대량 적재", "가족 단위 통형 아이스크림 및 안주류(육포, 마른안주) 1.5배 보강", "심야 시간대 조각 치킨류(카운터 FF) 소량 상시 노출"] });
            } else if (primaryWeather === "rain_heavy") {
                scriptText = "이번 주 잦은 비 소식으로 외출이 줄면서 배달(우리동네GS) 수요와 오피스 상권의 구내 식사 수요가 크게 늘어날 전망입니다. 우산 전면 배치와 가정간편식 발주를 늘려주세요.";
                guides.push({ target: "소가구주거 (원룸/빌라)", icon: "fa-cloud-showers-heavy", color: "text-cyan-700", bg: "bg-cyan-50", border: "border-cyan-200", points: ["외출 자제로 인한 배달 주문 폭증 대비 픽업 동선 정비 및 재고 확충", "비 오는 날 특수: 막걸리 발주 40% 상향 및 두부/김치 연관 진열", "가정간편식(HMR), 봉지라면 번들팩 등 쟁여두기 상품 발주 상향"] });
                guides.push({ target: "근무지 (오피스/공단)", icon: "fa-briefcase", color: "text-indigo-600", bg: "bg-indigo-50", border: "border-indigo-200", points: ["점심시간 외부 식당 이동 감소 → 도시락, 조리면 등 식사 대용 FF 20% 증량", "매장 입구 비닐우산 및 장우산 대량 전면 배치", "오후 시간대 직장인 간식용 컵커피, 베이커리 다단 진열"] });
            } else {
                scriptText = "쾌적하고 맑은 날씨가 이어져 야외 나들이객이 많은 여행지 및 공원 주변 상권의 매출 활성화가 기대됩니다. 피크닉 용품과 대용량 간편식 재고를 든든하게 채워주세요.";
                guides.push({ target: "여행지 / 유원지", icon: "fa-tree", color: "text-emerald-700", bg: "bg-emerald-50", border: "border-emerald-200", points: ["나들이객 타겟 대용량 생수(2L), 캔맥주, RTD 하이볼 골든존 집중 진열", "가족 단위 식사용 프리미엄 도시락, 샌드위치, 샐러드 발주 확대", "돗자리, 종이컵, 물티슈, 선크림 등 야외활동 특화 가판 팝업 구성"] });
                guides.push({ target: "주거/학원가 복합", icon: "fa-school", color: "text-teal-600", bg: "bg-teal-50", border: "border-teal-200", points: ["하교/퇴근 시간대 삼각김밥, 간편 조리빵 등 회전율 높은 FF 위주 전개", "10~20대 타겟 에너지드링크, 제로 탄산음료 냉장고 전면 노출", "카운터 FF (핫도그, 꼬치류) 하교 시간대 맞춤 조리"] });
            }

            // 스포츠 이벤트(월드컵) 추가
            if (matchedGames.length > 0) {
                scriptText += `\n\n⚽ [빅 이벤트 안내] 이번 주 한국 월드컵 경기 일정(${matchedGames.map(g => g.mdKey.replace('-','/') + ' ' + g.matchInfo).join(', ')})이 있습니다! 경기 시청을 위한 안주 및 주류 폭발적 수요가 예상되니 절대 결품이 없도록 대비 바랍니다.`;
                
                guides.unshift({ 
                    target: "🔥 월드컵 특수 공통 (주거/유동 집중)", 
                    icon: "fa-futbol", 
                    color: "text-red-700", bg: "bg-red-50", border: "border-red-300", 
                    points: [
                        "경기 시작 2~3시간 전 치킨25 배달/픽업 주문 폭주! 원부재료 2배 확보 및 사전 조리 가동",
                        "WIC(냉장고) 내 캔맥주 번들팩 최대치 적재 및 안주류(마른안주, 족발 등) 카운터 전면 배치",
                        "응원객 및 야간 취식 타겟 대형 스낵, 컵얼음 골든존 확장 운영"
                    ]
                });
            }

            plainScriptText = scriptText; // 복사용 저장
            return { scriptText, guides };
        }

        function calculateWeatherAndCoaching() {
            const now = new Date("2026-06-03T10:14:10");
            const days = ["일", "월", "화", "수", "목", "금", "토"];
            document.getElementById("todayBadge").innerText = `현재 기준: ${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;

            const sido = document.getElementById("sidoSelect").value;
            const sigungu = document.getElementById("sigunguSelect").value;
            if(!sigungu) return;

            const forecast = generateFakeForecast(sigungu, currentWeek);
            
            let htmlWeather = "";
            let hotCount = 0, rainCount = 0;
            let matchedHolidays = [];
            let matchedGames = [];

            forecast.forEach(item => {
                if(item.status === "hot_core") hotCount++;
                if(item.status === "rain_heavy") rainCount++;
                if(item.holidayName) matchedHolidays.push(item);
                if(item.matchInfo) matchedGames.push(item);

                let badge = item.status === "hot_core" ? "<span class='text-[10px] bg-red-100 text-red-600 px-1 py-0.5 rounded font-bold'>폭염</span>" 
                          : item.status === "rain_heavy" ? "<span class='text-[10px] bg-blue-100 text-blue-600 px-1 py-0.5 rounded font-bold'>비</span>" 
                          : "<span class='text-[10px] bg-emerald-100 text-emerald-600 px-1 py-0.5 rounded font-bold'>맑음</span>";
                
                let dayClass = item.isRedDay ? "text-red-600 font-extrabold" : "text-slate-600 font-bold";
                let holidayTag = item.holidayName ? `<div class="absolute -top-2 right-0 text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full shadow-sm">${item.holidayName}</div>` : "";
                
                htmlWeather += `
                    <div class="relative flex flex-col items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-200 text-center space-y-1.5 min-h-[110px]">
                        ${holidayTag}
                        <div class="text-[11px] text-slate-400 font-medium">${item.dateString}</div>
                        <div class="text-xs ${dayClass}">${item.dayLabel}요일</div>
                        <i class="fa-solid ${item.icon} text-slate-400 text-sm"></i>
                        <div class="font-bold text-xs text-slate-800">${item.temp}℃</div>
                        <div>${badge}</div>
                    </div>
                `;
            });

            document.getElementById("weeklyWeatherContainer").innerHTML = htmlWeather;

            // 이벤트 텍스트 바인딩 (수정 요청 사항 2번, 3번)
            const eventContainer = document.getElementById("eventTextContainer");
            let eventHtml = "";
            
            if (matchedHolidays.length > 0) {
                let hStr = matchedHolidays.map(h => `${h.dateString}(${h.dayLabel}) ${h.holidayName}`).join(', ');
                eventHtml += `<p class="text-sm font-bold text-red-600"><i class="fa-regular fa-calendar-check mr-1.5"></i>${hStr}</p>`;
            }
            if (matchedGames.length > 0) {
                let gStr = matchedGames.map(g => `${g.dateString}(${g.dayLabel}) ${g.matchInfo}`).join(' / ');
                eventHtml += `<p class="text-sm font-bold text-blue-700"><i class="fa-solid fa-futbol mr-1.5"></i>2026 월드컵 주요경기: ${gStr}</p>`;
            }
            
            if(eventHtml === "") {
                eventContainer.style.display = "none";
            } else {
                eventContainer.style.display = "flex";
                eventContainer.innerHTML = eventHtml;
            }

            // 가이드 생성 (수정 요청 사항 1번, 4번)
            let primaryWeather = "perfect";
            if(hotCount >= 3) primaryWeather = "hot_core";
            else if (rainCount >= 2) primaryWeather = "rain_heavy";

            const { scriptText, guides } = buildUnifiedGuide(primaryWeather, matchedHolidays, matchedGames);
            
            document.getElementById("coachingQuote").innerText = scriptText;
            
            let guidesHtml = "";
            guides.forEach(g => {
                let lis = g.points.map(p => `<li class="flex items-start"><i class="fa-solid fa-check text-[10px] mt-1 mr-2 opacity-60"></i><span>${p}</span></li>`).join('');
                guidesHtml += `
                    <div class="p-4 rounded-xl border ${g.bg} ${g.border}">
                        <h4 class="font-bold text-sm ${g.color} mb-2.5 flex items-center">
                            <i class="fa-solid ${g.icon} mr-1.5"></i> ${g.target}
                        </h4>
                        <ul class="text-xs text-slate-700 space-y-1.5 leading-relaxed font-medium">
                            ${lis}
                        </ul>
                    </div>
                `;
            });
            document.getElementById("dynamicGuidesContainer").innerHTML = guidesHtml;
        }

        function copyScript() {
            navigator.clipboard.writeText(plainScriptText).then(() => {
                alert("코칭 스크립트 요약이 클립보드에 복사되었습니다.\n경영주님 소통 채널에 즉시 활용하세요!");
            });
        }

        window.onload = function() {
            updateSigungu();
        };
    </script>
</body>
</html>
